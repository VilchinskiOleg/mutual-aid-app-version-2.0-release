server:
  port: 8200

logging:
  level:
    root: INFO
    org.tms.profile_service_core.domain.service.kafka.producer.ProfileTaskForRetryingProducer: DEBUG

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

application:
  api-info:
    version: 2.0
    title: PROFILE
    description: Profile SERVICE
    contact:
      name: OLEG
      url: https://mail.google.com
      email: vilchinskioleg@gmail.com

feign:
  client:
    config:
      authRestFeignClient:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: full
        requestInterceptors:
          - org.tms.profile_service_core.configuration.client.auth.AuthRestClientAuthInterceptor

auth-rest-client:
  url: http://${AUTH_SERVICE_HOST:localhost}:8100
  user: profile-service-rest-client
  # for common auth config:
  read-timeout: 15000
  connection-timeout: 10000

kafka:
  bootstrap-servers: ${KAFKA_BROKER_HOST:localhost}:9093
  schema-registry-url: http://${KAFKA_SCHEMA_REGISTRY_HOST:localhost}:8081
  # SSL security:

enable-task-retry: true